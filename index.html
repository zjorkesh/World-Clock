<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    
    <title>World Clock - Zeinab Jorkesh</title>
</head>

<body>
    <div class="container">
    <h1>
        World Clock
    </h1>
    <div class="select">
        <select name="" id="">
            <option value="">Choose city</option>
            <option value="USA/Los-angeles">Los angeles</option>
            <option value="Australia/Sydney">Sydney</option>
            <option value="Japon/Tokyo">Tokyo</option>
        </select>
        
    </div>
    <div class="city">
        <div class="los-angeles">
            <span class="city-name">los angeles </span> <span class="time">1:48:15 AM</span>
            <div class="date">August 15th 2022</div>
        </div>
        <div class="los-angeles">
            <span class="city-name">Sydney </span> <span class="time">1:48:15 AM</span>
            <div class="date">August 15th 2022</div>
        </div>
        <div class="los-angeles">
            <span class="city-name">Tokyo </span> <span class="time">1:48:15 AM</span>
            <div class="date">August 15th 2022</div>
        </div>                

    </div>
    </div>

    <footer>
        This project is coded by Zeinab Jorkesh and is open sourced on <a href="https://github.com/zjorkesh?tab=repositories" target="_blank">GitHub</a>.
    </footer>
<script src="src/index.js"></script>
</body>
</html>
