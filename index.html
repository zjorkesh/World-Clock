<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.1/moment-timezone-with-data-1970-2030.min.js
"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>World Clock - Zeinab Jorkesh</title>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="title">
          <h1>World Clock 🕛</h1>
          <p>See the time around the world</p>
        </div>
      </header>

      <main class="layout">
        <section class="cities">
          <div id="cities-list">
            <article class="city" id="current">
              <div class="city-info">
                <h2></h2>
                <p class="country"></p>
              </div>

              <div class="city-date">
                <time class="date"></time>
                <p class="day"></p>
              </div>

              <div class="city-time">
                <time class="time">3:43:24</time>
                <span class="period"></span>
                <p class="difference">your time</p>
              </div>
            </article>

            <article class="city" id="los-angeles">
              <div class="city-info">
                <h2>Los Angeles</h2>
                <p class="country">Ameraica</p>
              </div>

              <div class="city-date">
                <time class="date"></time>
                <p class="day"></p>
              </div>

              <div class="city-time">
                <time class="time"></time>
                <span class="period"></span>
                <p class="difference">hour behind</p>
              </div>
            </article>

            <article class="city" id="sydney">
              <div class="city-info">
                <h2>Sydney</h2>
                <p class="country">Australia</p>
              </div>

              <div class="city-date">
                <time class="date"></time>
                <p class="day"></p>
              </div>

              <div class="city-time">
                <time class="time"></time>
                <span class="period"></span>
                <p class="difference">hour ahead</p>
              </div>
            </article>
            <article class="city" id="tokyo">
              <div class="city-info">
                <h2>Tokyo</h2>
                <p class="country">Japan</p>
              </div>

              <div class="city-date">
                <time class="date"></time>
                <p class="day"></p>
              </div>

              <div class="city-time">
                <time class="time"></time>
                <span class="period"></span>
                <p class="difference">hour ahead</p>
              </div>
            </article>
          </div>
        </section>

        <aside class="sidebar">
          <div class="search-box">
            <label for="city-select">Search City</label>

            <select id="city-select" size="19">
              <option value="">🔍 Search a city...</option>
            </select>
          </div>

          <section class="selected-city">
            <h2 class="selected-name">Choose a city</h2>

            <p class="selected-country"></p>

            <time class="selected-time"></time>

            <div class="selected-date-row">
              <p class="selected-date"></p>
              <p class="selected-day"></p>
            </div>
          </section>

          <section class="time-comparison">
            <h3>Time Comparison</h3>

            <p class="comparison-text"></p>

            <div class="comparison-row">
              <div class="comparison-item">
                <span>Your Time</span>
                <strong class="current-time"></strong>
              </div>

              <div class="comparison-item">
                <span class="selected-city-label"></span>
                <strong class="selected-city-time"></strong>
              </div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <footer>
      This project is coded by Zeinab Jorkesh and is open sourced on
      <a href="https://github.com/zjorkesh?tab=repositories" target="_blank"
        >GitHub</a
      >.
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
